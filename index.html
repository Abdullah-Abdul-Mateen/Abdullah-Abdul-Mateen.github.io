<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdullah Abdul Mateen</title>

  <!-- Tailwind CDN (simple + reliable for GitHub Pages) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
  </style>
</head>

<body class="bg-neutral-950 text-neutral-100 min-h-screen flex items-center justify-center px-6">

  <div class="max-w-xl w-full text-center space-y-6">

    <!-- Title -->
    <h1 class="text-3xl md:text-4xl font-light tracking-wide">
      Abdullah Abdul Mateen
    </h1>

    <!-- Subtitle -->
    <p class="text-neutral-400 text-sm md:text-base leading-relaxed">
      Something refined is on the way. A carefully crafted digital experience is under construction.
    </p>

    <!-- Divider -->
    <div class="h-px w-16 bg-neutral-800 mx-auto"></div>

    <!-- Status -->
    <div class="text-xs tracking-[0.25em] uppercase text-neutral-500">
      Coming Soon
    </div>

    <!-- Email -->
    <div class="pt-4">
      <p class="text-xs text-neutral-500 mb-3">
        Get notified when we launch
      </p>

      <input
        type="email"
        placeholder="Enter your email"
        class="w-full max-w-xs mx-auto block bg-transparent border border-neutral-800 px-4 py-2 text-sm text-neutral-200 placeholder:text-neutral-600 outline-none focus:border-neutral-600 transition"
      />
    </div>

    <!-- Footer -->
    <p class="text-[11px] text-neutral-700 pt-8">
      © 2026 Abdullah Abdul Mateen. All rights reserved.
    </p>

  </div>

</body>
</html>
